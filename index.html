<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>恐慌から世界情勢へクイズ</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
<style>
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  text-align:center;
  background:linear-gradient(135deg,#bfdbfe,#fbcfe8);
}

h1{margin-top:30px;}

.menuBtn{
  display:block;
  margin:15px auto;
  padding:20px;
  width:360px;
  font-size:22px;
  border:none;
  border-radius:25px;
  color:white;
  cursor:pointer;
}

.sec1{background:#60a5fa;}
.sec2{background:#34d399;}
.sec3{background:#f472b6;}

#quizBox{display:none;margin-top:30px;}

.choice{
  display:block;
  margin:10px auto;
  padding:14px;
  width:330px;
  font-size:18px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  background:white;
}

.correct{background:#86efac !important;}
.wrong{background:#fca5a5 !important;}

#timer{font-size:20px;color:#ef4444;margin-bottom:10px;}

#feedback{
  margin-top:10px;
  font-size:18px;
  font-weight:bold;
}

.resultBtn{
  margin:10px;
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:20px;
  background:#818cf8;
  color:white;
  cursor:pointer;
}
</style>
</head>
<body>

<h1>🌏 恐慌から世界情勢へ 🌏</h1>

<div id="menu">
  <button class="menuBtn sec1" onclick="startSection(1)">セクション1（1〜6）</button>
  <button class="menuBtn sec2" onclick="startSection(2)">セクション2（7〜14）</button>
  <button class="menuBtn sec3" onclick="startSection(3)">セクション3（15〜19）</button>
</div>

<div id="quizBox">
  <div id="timer"></div>
  <h2 id="question"></h2>
  <div id="choices"></div>
  <div id="feedback"></div>
</div>

<div id="result"></div>

<script>

const quizData = [

/* セクション1 */
{sec:1,q:"浜口雄幸首相を狙撃した青年は？",
choices:["佐郷屋留雄","血盟団員","河本大作","井上準之助"],
a:"佐郷屋留雄"},

{sec:1,q:"浜口雄幸に代わって就任した首相は？",
choices:["犬養毅","若槻礼次郎","田中義一","近衛文麿"],
a:"犬養毅"},

{sec:1,q:"犬養毅が大蔵大臣に指名した人物は？",
choices:["高橋是清","井上準之助","片岡直温","若槻礼次郎"],
a:"高橋是清"},

{sec:1,q:"企業連合で独占禁止法の対象となる行為は？",
choices:["カルテル","コンツェルン","トラスト","談合"],
a:"カルテル"},

{sec:1,q:"カルテルと並ぶ企業連携は？",
choices:["コンツェルン","トラスト","財閥","系列"],
a:"コンツェルン"},

{sec:1,q:"安価な製品を買い集め高値で販売した政策は？",
choices:["ソーシャルダンピング","ブロック経済","ニューディール","保護貿易"],
a:"ソーシャルダンピング"},

/* セクション2 */
{sec:2,q:"ソ連が恐慌の影響を受けなかった政策は？",
choices:["五か年計画","戦時共産主義","新経済政策","集団農場化"],
a:"五か年計画"},

{sec:2,q:"その頃のソ連指導者は？",
choices:["スターリン","レーニン","トロツキー","フルシチョフ"],
a:"スターリン"},

{sec:2,q:"植民地内だけで貿易する経済圏は？",
choices:["ブロック経済","自由貿易圏","通貨同盟","経済統合"],
a:"ブロック経済"},

{sec:2,q:"失業者を公共事業に雇う政策は？",
choices:["ニューディール政策","ブレトンウッズ体制","金本位制","モンロー主義"],
a:"ニューディール政策"},

{sec:2,q:"その頃の米大統領は？",
choices:["フランクリン・ルーズベルト","トルーマン","ウィルソン","フーバー"],
a:"フランクリン・ルーズベルト"},

{sec:2,q:"当時のドイツ指導者は？",
choices:["ヒトラー","ムッソリーニ","カイザー","ビスマルク"],
a:"ヒトラー"},

{sec:2,q:"当時のイタリア指導者は？",
choices:["ムッソリーニ","ヒトラー","ガリバルディ","カヴール"],
a:"ムッソリーニ"},

{sec:2,q:"日本で同様の動きは？",
choices:["軍国主義","立憲主義","民主主義","社会主義"],
a:"軍国主義"},

/* セクション3 */
{sec:3,q:"中華民国政府を認めない中国人は？",
choices:["軍閥","革命派","共産党","国民党"],
a:"軍閥"},

{sec:3,q:"当時の日本内閣は？",
choices:["田中義一","浜口雄幸","犬養毅","若槻礼次郎"],
a:"田中義一"},

{sec:3,q:"日本が傀儡政権のトップにした人物は？",
choices:["張作霖","蒋介石","孫文","袁世凱"],
a:"張作霖"},

{sec:3,q:"張作霖が暗殺された事件は？",
choices:["張作霖爆殺事件","満州事変","辛亥革命","五・四運動"],
a:"張作霖爆殺事件"},

{sec:3,q:"それを起こした参謀は？",
choices:["河本大作","東條英機","板垣征四郎","石原莞爾"],
a:"河本大作"}

];

let currentSection,currentQuiz,index,score,timer,timeLeft;
let mistakes=[];

function startSection(sec){
  currentSection=sec;
  currentQuiz=quizData.filter(q=>q.sec===sec);
  index=0;
  score=0;
  mistakes=[];
  document.getElementById("menu").style.display="none";
  document.getElementById("result").innerHTML="";
  document.getElementById("quizBox").style.display="block";
  nextQuestion();
}

function nextQuestion(){
  if(index>=currentQuiz.length){ finishSection(); return; }

  document.getElementById("feedback").innerHTML="";
  const q=currentQuiz[index];
  document.getElementById("question").innerText=`Q${index+1}. ${q.q}`;

  let shuffled=[...q.choices].sort(()=>Math.random()-0.5);
  const div=document.getElementById("choices");
  div.innerHTML="";

  shuffled.forEach(choice=>{
    const btn=document.createElement("button");
    btn.className="choice";
    btn.innerText=choice;
    btn.onclick=()=>answer(choice);
    div.appendChild(btn);
  });

  startTimer();
}

function startTimer(){
  timeLeft=10;
  document.getElementById("timer").innerText=`⏰ 残り${timeLeft}秒`;
  clearInterval(timer);
  timer=setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText=`⏰ 残り${timeLeft}秒`;
    if(timeLeft<=0){
      clearInterval(timer);
      answer("");
    }
  },1000);
}

function answer(choice){
  clearInterval(timer);
  const correct=currentQuiz[index].a;
  const buttons=document.querySelectorAll(".choice");
  const feedback=document.getElementById("feedback");

  buttons.forEach(btn=>{
    btn.disabled=true;
    if(btn.innerText===correct) btn.classList.add("correct");
    if(btn.innerText===choice && choice!==correct) btn.classList.add("wrong");
  });

  if(choice===correct){
    score++;
    feedback.innerHTML="⭕ 正解！";
    feedback.style.color="green";
  }else{
    mistakes.push({question:currentQuiz[index].q,correct:correct});
    feedback.innerHTML=`❌ 正解：${correct}`;
    feedback.style.color="red";
  }

  setTimeout(()=>{
    index++;
    nextQuestion();
  },1500);
}

function finishSection(){
  document.getElementById("quizBox").style.display="none";

  let html=`<h2>🎉 セクション終了 🎉</h2>`;
  html+=`<p>得点: ${score} / ${currentQuiz.length}</p>`;

  if(mistakes.length>0){
    html+="<h3>間違えた問題</h3>";
    mistakes.forEach(m=>{
      html+=`<p>問題: ${m.question}<br>正解: ${m.correct}</p>`;
    });
  }

  html+=`<button class="resultBtn" onclick="goMenu()">最初に戻る</button>`;
  if(currentSection<3){
    html+=`<button class="resultBtn" onclick="startSection(${currentSection+1})">次のセクションへ</button>`;
  }

  document.getElementById("result").innerHTML=html;
}

function goMenu(){
  document.getElementById("result").innerHTML="";
  document.getElementById("menu").style.display="block";
}
</script>
</body>
</html>
